<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Repairs | HA-FIX Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b1121; --glass-bg: rgba(25, 33, 60, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top left, #172033, var(--bg-color)); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.5; }
        .blob.blue { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--accent-blue); }
        .blob.purple { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--accent-purple); }
        
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 3000; background: var(--accent-blue); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2400; }
        .sidebar-overlay.active { display: block; }

        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; z-index: 2500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .company-info h2 { font-size: 1.2rem; background: -webkit-linear-gradient(left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .company-info p { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .nav-menu li a { text-decoration: none; color: var(--text-muted); padding: 12px 16px; border-radius: 12px; display: block; transition: 0.3s; font-weight: 600; font-size: 0.9rem; }
        .nav-menu li a:hover, .nav-menu li a.active { background: rgba(59, 130, 246, 0.15); color: var(--text-main); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; position: relative; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; font-weight: 700; }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
        .glass-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .glass-table th, .glass-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--glass-border); vertical-align: top; }
        .glass-table th { color: var(--text-muted); font-size: 0.9rem; }
        
        .status { padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; display: inline-block; }
        .status.waiting { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.5); }
        .status.repairing { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.5); }
        .status.done { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.5); }
        .status.cancelled { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.5); text-decoration: line-through; }
        
        .action-group { display: flex; flex-direction: column; gap: 5px; width: 120px; }
        .btn-action { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; font-weight: bold; text-align: center; }
        .btn-action:hover:not(:disabled) { background: var(--accent-blue); border-color: var(--accent-blue); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-pay { background: rgba(52, 211, 153, 0.2); border-color: #34d399; color: #34d399; }
        .btn-pay:hover:not(:disabled) { background: #34d399; color: white; }
        .btn-profile { background: rgba(245, 158, 11, 0.2); border-color: #f59e0b; color: #fcd34d; }
        .btn-profile:hover { background: #f59e0b; color: white; }
        
        .glass-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: var(--text-main); outline: none; transition: 0.3s; margin-bottom: 15px; font-size: 0.9rem; }
        .glass-input:focus { border-color: var(--accent-blue); background: rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }

        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            body { flex-direction: column; }
            .sidebar { position: fixed; left: -100%; top: 0; height: 100vh; }
            .sidebar.active { left: 0; }
            .main-content { padding: 1rem; padding-top: 5rem; }
            .header h1 { font-size: 1.5rem; }
            .glass-panel { padding: 1.2rem; }
            #generateReceiptForm { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuBtn">☰ MENU</button>
    <div class="sidebar-overlay" id="overlay"></div>

    <aside class="sidebar">
        <div class="company-info">
            <h2>HA-FIX TECH</h2>
            <p>202503246898 (003772792-K)<br>Management System</p>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="customers.html">Leads & Quotes</a></li>
            <li><a href="services.html" class="active">Active Repairs</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="finance.html">Finance</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="logoutAdmin()" style="color: #f87171;">Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Active Repairs</h1>
        </header>

        <div class="glass-panel">
            <div class="table-responsive">
                <table class="glass-table">
                    <thead>
                        <tr>
                            <th width="15%">Ticket</th>
                            <th width="20%">Customer</th>
                            <th width="25%">Device & Issue</th>
                            <th width="15%">Balance (RM)</th>
                            <th width="15%">Status</th>
                            <th width="10%">Action</th>
                        </tr>
                    </thead>
                    <tbody id="ticketsTableBody">
                        <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="statusModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 3100; justify-content: center; align-items: center;">
        <div class="glass-panel" style="width: 100%; max-width: 400px; position: relative;">
            <button onclick="document.getElementById('statusModal').style.display='none'" style="position: absolute; right: 20px; top: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h2 style="margin-bottom: 20px; color: var(--accent-blue);">Update Status</h2>
            <form id="updateStatusForm">
                <input type="hidden" id="sTicketId">
                <label style="font-size: 0.85rem; color: var(--text-muted);">Select Status:</label>
                <select id="sStatus" class="glass-input" required style="background-color: #172033; color:white;">
                    <option value="Menunggu Alat Ganti">Waiting for Parts</option>
                    <option value="Sedang Diagnosting">Diagnosing</option>
                    <option value="Sedang Dibaiki">In Progress</option>
                    <option value="Siap">Ready for Collection</option>
                    <option value="Batal">Cancelled</option>
                </select>
                <button type="submit" class="btn-primary">Save Status</button>
            </form>
        </div>
    </div>

    <div id="receiptModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 3100; justify-content: center; align-items: center; overflow-y: auto; padding: 20px;">
        <div class="glass-panel" style="width: 100%; max-width: 600px; position: relative; margin: auto; max-height: 90vh; overflow-y: auto;">
            <button onclick="document.getElementById('receiptModal').style.display='none'" style="position: absolute; right: 20px; top: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h2 style="margin-bottom: 20px; color: var(--accent-purple);">Generate Official Document</h2>
            
            <form id="generateReceiptForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px 15px;">
                <input type="hidden" id="rCustId">
                
                <div style="grid-column: span 2;">
                    <label style="font-size: 0.85rem; color: #93c5fd;">Document Type:</label>
                    <select id="docType" class="glass-input" style="background-color: #172033; color: white;">
                        <option value="RECEIPT">Official Receipt</option>
                        <option value="INVOICE">Invoice</option>
                    </select>
                </div>
                
                <div style="grid-column: span 2;">
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Parts/Service Items:</label>
                    <textarea id="rPartsList" class="glass-input" rows="3" placeholder="Contoh: LCD Replacement - RM 150"></textarea>
                </div>
                
                <div>
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Parts Cost (RM):</label>
                    <input type="number" id="rPartsCost" class="glass-input" step="0.01">
                </div>
                
                <div>
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Labor (RM):</label>
                    <input type="number" id="rLaborCost" class="glass-input" step="0.01">
                </div>
                
                <div>
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Delivery (RM):</label>
                    <input type="number" id="rDeliveryCost" class="glass-input" step="0.01">
                </div>
                
                <div>
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Deposit Paid (RM):</label>
                    <input type="number" id="rDeposit" class="glass-input" step="0.01">
                </div>
                
                <div style="grid-column: span 2;">
                    <label style="font-size: 0.85rem; color: var(--text-muted);">Payment Method:</label>
                    <select id="rPaymentMethod" class="glass-input" style="background-color: #172033; color: white;">
                        <option value="Cash">Cash</option>
                        <option value="QR Pay">QR Pay</option>
                        <option value="Online Transfer">Online Transfer</option>
                    </select>
                </div>
                
                <div style="grid-column: span 2;">
                    <button type="button" onclick="saveAndPrintDoc()" class="btn-primary">📄 Print / Generate PDF</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, getDocs, onSnapshot, query, where, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs", authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com", projectId: "ha-fix-tech-repair-8d27f", storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app", messagingSenderId: "630965976099", appId: "1:630965976099:web:9ff830cd7f5f624b060596", measurementId: "G-KJRGT6LQ43" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('overlay');
        function toggleMenu() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); menuBtn.innerText = sidebar.classList.contains('active') ? '✕ CLOSE' : '☰ MENU'; }
        menuBtn.addEventListener('click', toggleMenu); overlay.addEventListener('click', toggleMenu);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.replace("login.html"); });
        window.logoutAdmin = () => signOut(auth).then(() => window.location.replace("login.html"));

        // RENDER JADUAL
        onSnapshot(query(collection(db, "tickets"), orderBy("createdAt", "desc")), (snapshot) => {
            const tbody = document.getElementById('ticketsTableBody');
            tbody.innerHTML = "";
            snapshot.forEach((documentSnapshot) => {
                const data = documentSnapshot.data();
                const ticketId = documentSnapshot.id;
                
                onSnapshot(query(collection(db, "customers"), where("ticketId", "==", ticketId)), (cSnap) => {
                    let isPaid = false, balance = 0, custDocId = "";
                    if(!cSnap.empty) {
                        const cData = cSnap.docs[0].data();
                        isPaid = cData.isPaid || false; balance = cData.balancePrice || 0; custDocId = cSnap.docs[0].id;
                    }

                    let row = document.getElementById(`row-${ticketId}`);
                    if(!row) { row = document.createElement('tr'); row.id = `row-${ticketId}`; tbody.appendChild(row); }

                    let displayStatus = "Repairing", statusClass = "repairing";
                    if(data.status === "Menunggu Alat Ganti") { displayStatus = "Waiting Parts"; statusClass = "waiting"; }
                    else if(data.status === "Sedang Diagnosting") { displayStatus = "Diagnosing"; statusClass = "repairing"; }
                    else if(data.status === "Siap") { displayStatus = "Ready"; statusClass = "done"; }
                    else if(data.status === "Batal") { displayStatus = "Cancelled"; statusClass = "cancelled"; }

                    row.innerHTML = `
                        <td style="font-weight:bold; color:var(--accent-blue);">#${ticketId}</td>
                        <td><strong>${data.name}</strong><br><small>${data.phone}</small></td>
                        <td>${data.device}<br><small>${data.issue || '-'}</small></td>
                        <td><strong style="color:#34d399;">RM ${balance}</strong></td>
                        <td><span class="status ${statusClass}">${displayStatus}</span></td>
                        <td>
                            <div class="action-group">
                                <button class="btn-action btn-profile" onclick="window.location.href='customer-details.html?id=${custDocId}'">🔍 Details</button>
                                <button class="btn-action" onclick="openStatusModal('${ticketId}', '${data.status}')">🔄 Status</button>
                                ${!isPaid ? `<button class="btn-action btn-pay" onclick="confirmPayment('${custDocId}', '${balance}', '${ticketId}')">💰 Pay</button>` : `<span style="color:#34d399; font-weight:bold; text-align:center;">✅ Paid</span>`}
                                <button class="btn-action" id="print-btn-${ticketId}" ${!isPaid ? 'disabled' : ''} onclick="openReceiptModal('${ticketId}')">📄 Print</button>
                            </div>
                        </td>
                    `;
                });
            });
        });

        // FUNGSI BAYARAN & STATUS
        window.confirmPayment = async (custId, balance, ticketId) => {
            if(confirm(`Receive RM ${balance}?`)) {
                await updateDoc(doc(db, "customers", custId), { isPaid: true });
                await addDoc(collection(db, "transactions"), { type: "Income", amount: parseFloat(balance), category: "Repair", desc: `Final Pay #${ticketId}`, date: new Date().toISOString().split('T')[0], createdAt: new Date().toISOString() });
            }
        };

        window.openStatusModal = (id, status) => { document.getElementById('sTicketId').value = id; document.getElementById('sStatus').value = status; document.getElementById('statusModal').style.display = 'flex'; };
        document.getElementById('updateStatusForm').onsubmit = async (e) => { e.preventDefault(); await updateDoc(doc(db, "tickets", document.getElementById('sTicketId').value), { status: document.getElementById('sStatus').value }); document.getElementById('statusModal').style.display = 'none'; };

        // FUNGSI BUKA MODAL RESIT
        window.openReceiptModal = async (ticketId) => {
            const q = query(collection(db, "customers"), where("ticketId", "==", ticketId));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const d = snap.docs[0].data(); 
                const custId = snap.docs[0].id;
                
                document.getElementById('rCustId').value = custId;
                document.getElementById('rPartsList').value = d.partsList || "";
                document.getElementById('rPartsCost').value = d.partsTotal || 0;
                document.getElementById('rLaborCost').value = d.serviceCharge || 0;
                document.getElementById('rDeliveryCost').value = d.deliveryCharge || 0;
                document.getElementById('rDeposit').value = d.deposit || 0;
                
                document.getElementById('receiptModal').style.display = 'flex';
            }
        };

        // FUNGSI SIMPAN & PANGGIL PRINT-RECEIPT.HTML
        window.saveAndPrintDoc = async () => {
            const custId = document.getElementById('rCustId').value;
            const docType = document.getElementById('docType').value;
            
            // Simpan data terbaru ke dalam database dulu
            await updateDoc(doc(db, "customers", custId), {
                partsList: document.getElementById('rPartsList').value,
                partsTotal: document.getElementById('rPartsCost').value,
                serviceCharge: document.getElementById('rLaborCost').value,
                deliveryCharge: document.getElementById('rDeliveryCost').value,
                deposit: document.getElementById('rDeposit').value,
                paymentMethod: document.getElementById('rPaymentMethod').value
            });
            
            // Tutup Modal
            document.getElementById('receiptModal').style.display = 'none';
            
            // Buka tab baru dan hantar ID & Jenis Dokumen ke print-receipt.html
            window.open(`print-receipt.html?id=${custId}&doc=${docType}`, '_blank');
        };
    </script>
</body>
</html>
