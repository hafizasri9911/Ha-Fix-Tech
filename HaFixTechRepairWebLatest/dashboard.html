<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | HA-FIX Tech & Repair</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b1121; --glass-bg: rgba(25, 33, 60, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top left, #172033, var(--bg-color)); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.5; }
        .blob.blue { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--accent-blue); }
        .blob.purple { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--accent-purple); }

        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
        .company-info h2 { font-size: 1.2rem; background: -webkit-linear-gradient(left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .company-info p { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }
        
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .nav-menu li a { text-decoration: none; color: var(--text-muted); padding: 12px 16px; border-radius: 12px; display: block; transition: all 0.3s ease; font-weight: 600; font-size: 0.9rem; }
        .nav-menu li a:hover, .nav-menu li a.active { background: rgba(59, 130, 246, 0.15); color: var(--text-main); border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .main-content { flex: 1; padding: 3rem; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header h1 { font-size: 2rem; font-weight: 700; }

        /* Butang Tukar Bahasa */
        .lang-switcher { display: flex; gap: 10px; background: var(--glass-bg); padding: 5px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .lang-btn { background: transparent; color: var(--text-main); border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-weight: 600; transition: 0.3s; opacity: 0.5; }
        .lang-btn.active { background: var(--accent-blue); opacity: 1; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: rgba(255, 255, 255, 0.2); }
        .glass-card h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; }
        .glass-card .value { font-size: 2.2rem; font-weight: 700; color: var(--text-main); }
    </style>
</head>
<body>

    <div class="blob blue"></div>
    <div class="blob purple"></div>

    <aside class="sidebar">
        <div class="company-info">
            <h2>HA-FIX TECH</h2>
            <p>202503246898 (003772792-K)<br>Kuala Nerus, Terengganu</p>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html" class="active lang" data-en="Dashboard" data-ms="Papan Pemuka">Dashboard</a></li>
            <li><a href="customers.html" class="lang" data-en="Customers" data-ms="Pelanggan">Customers</a></li>
            <li><a href="services.html" class="lang" data-en="Services & Receipts" data-ms="Servis & Resit">Services & Receipts</a></li>
            <li><a href="inventory.html" class="lang" data-en="Inventory" data-ms="Inventori">Inventory</a></li>
            <li><a href="finance.html" class="lang" data-en="Finance" data-ms="Kewangan">Finance</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="logoutAdmin()" style="color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3);" class="lang" data-en="Logout" data-ms="Log Keluar">Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="lang" data-en="Overview Summary" data-ms="Ringkasan Keseluruhan">Overview Summary</h1>
            
            <div class="lang-switcher">
                <button id="btn-en" class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button id="btn-ms" class="lang-btn" onclick="setLanguage('ms')">MS</button>
            </div>
        </header>

        <section class="cards-grid">
            <div class="glass-card">
                <h3 class="lang" data-en="Devices In Repair" data-ms="Peranti Sedang Dibaiki">Devices In Repair</h3>
                <div id="countRepairing" class="value">0</div>
            </div>
            <div class="glass-card">
                <h3 class="lang" data-en="Total Customers" data-ms="Jumlah Pelanggan">Total Customers</h3>
                <div id="countCustomers" class="value">0</div>
            </div>
            <div class="glass-card">
                <h3 class="lang" data-en="Waiting For Parts" data-ms="Menunggu Alat Ganti">Waiting For Parts</h3>
                <div id="countWaiting" class="value">0</div>
            </div>
            <div class="glass-card">
                <h3 class="lang" data-en="Recent Sales (RM)" data-ms="Jualan Terkini (RM)">Recent Sales (RM)</h3>
                <div id="countSales" class="value" style="font-size: 1.5rem; margin-top: 10px;">Menunggu Modul Kewangan</div>
            </div>
        </section>
    </main>

    <script type="module">
        // 1. Fungsi Dwibahasa
        window.setLanguage = function(lang) {
            const elements = document.querySelectorAll('.lang');
            elements.forEach(el => {
                if(el.getAttribute(`data-${lang}`)) {
                    el.innerText = el.getAttribute(`data-${lang}`);
                }
            });
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById('btn-ms').classList.remove('active');
            document.getElementById(`btn-${lang}`).classList.add('active');
        }

        // 2. Import Firebase & Firestore
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs",
            authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com",
            projectId: "ha-fix-tech-repair-8d27f",
            storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app",
            messagingSenderId: "630965976099",
            appId: "1:630965976099:web:9ff830cd7f5f624b060596",
            measurementId: "G-KJRGT6LQ43"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Guard & Logout
        onAuthStateChanged(auth, (user) => { if (!user) window.location.replace("login.html"); });
        window.logoutAdmin = function() {
            if(confirm("Log keluar dari sistem?")) signOut(auth).then(() => window.location.replace("login.html"));
        };

        // 3. TARIK DATA STATISTIK SECARA LIVE (REAL-TIME)

        // A. Kira tiket yang berstatus "Sedang Dibaiki"
        const qRepairing = query(collection(db, "tickets"), where("status", "==", "Sedang Dibaiki"));
        onSnapshot(qRepairing, (snapshot) => {
            document.getElementById('countRepairing').innerText = snapshot.size;
        });

        // B. Kira tiket yang berstatus "Menunggu Alat Ganti"
        const qWaiting = query(collection(db, "tickets"), where("status", "==", "Menunggu Alat Ganti"));
        onSnapshot(qWaiting, (snapshot) => {
            document.getElementById('countWaiting').innerText = snapshot.size;
        });

        // C. Kira jumlah keseluruhan pelanggan dalam pangkalan data
        onSnapshot(collection(db, "customers"), (snapshot) => {
            document.getElementById('countCustomers').innerText = snapshot.size;
        });

    </script>
</body>
</html>
