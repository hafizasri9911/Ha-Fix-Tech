<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details | HA-FIX Tech & Repair</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b1121; --glass-bg: rgba(25, 33, 60, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top left, #172033, var(--bg-color)); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.5; }
        .blob.blue { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--accent-blue); }
        .blob.purple { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--accent-purple); }
        
        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
        .company-info h2 { font-size: 1.2rem; background: -webkit-linear-gradient(left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .company-info p { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .nav-menu li a { text-decoration: none; color: var(--text-muted); padding: 12px 16px; border-radius: 12px; display: block; transition: 0.3s; font-weight: 600; font-size: 0.9rem; }
        .nav-menu li a:hover, .nav-menu li a.active { background: rgba(59, 130, 246, 0.15); color: var(--text-main); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; font-weight: 700; display: flex; align-items: center; gap: 15px;}
        
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .btn-back:hover { background: rgba(255,255,255,0.2); }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2.5rem; max-width: 900px; margin: 0 auto; }
        
        .details-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 20px; }
        @media (max-width: 768px) { .details-grid { grid-template-columns: 1fr; } }

        .section-title { font-size: 1rem; color: var(--accent-blue); border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; margin-bottom: 10px; margin-top: 20px; font-weight: bold; grid-column: span 3; }
        @media (max-width: 768px) { .section-title { grid-column: span 1; } }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        
        .glass-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: var(--text-main); outline: none; transition: 0.3s; font-size: 0.95rem; margin-bottom: 5px;}
        .glass-input:focus { border-color: var(--accent-blue); background: rgba(255, 255, 255, 0.1); }
        .glass-input:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; font-size: 1rem; margin-top: 1rem; grid-column: span 3; }
        @media (max-width: 768px) { .btn-primary { grid-column: span 1; } }
        .btn-primary:hover { box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); transform: translateY(-2px); }

        .full-width { grid-column: span 3; }
        @media (max-width: 768px) { .full-width { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="blob blue"></div>
    <div class="blob purple"></div>

    <aside class="sidebar">
        <div class="company-info">
            <h2>HA-FIX TECH</h2>
            <p>202503246898 (003772792-K)<br>Kuala Nerus, Terengganu</p>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="customers.html">Leads & Quotes</a></li>
            <li><a href="services.html">Active Repairs</a></li>
            <li><a href="inventory.html" class="active">Inventory</a></li>
            <li><a href="finance.html">Finance</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>
                <a href="#" onclick="history.back(); return false;" class="btn-back">← Kembali</a> 
                Butiran Penuh Barang
            </h1>
        </header>

        <div class="glass-panel">
            <form id="detailsForm" class="details-grid">
                
                <div class="section-title" style="margin-top: 0;">1. Klasifikasi Peranti (Type 1 - Type 3)</div>
                
                <div class="form-group">
                    <label>Kategori Utama</label>
                    <select id="dCategory" class="glass-input" required style="background-color: #172033;">
                        <option value="Alat Ganti">Alat Ganti / Spare Part</option>
                        <option value="Aksesori">Aksesori</option>
                        <option value="Peralatan">Peralatan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenis Peranti (Type 1)</label>
                    <select id="dType1" class="glass-input auto-name-trigger" style="background-color: #172033;">
                        <option value="">- Pilih Jenis -</option>
                        <option value="Phone">Phone</option>
                        <option value="Tablet">Tablet</option>
                        <option value="Laptop">Laptop</option>
                        <option value="PC">PC</option>
                        <option value="Services">Services</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenama Peranti (Type 2)</label>
                    <input type="text" id="dType2" class="glass-input auto-name-trigger" placeholder="Cth: Apple, Xiaomi, Samsung">
                </div>
                <div class="form-group full-width">
                    <label>Model Peranti Spesifik (Type 3)</label>
                    <input type="text" id="dType3" class="glass-input auto-name-trigger" placeholder="Cth: iPhone 13 Pro Max">
                </div>

                <div class="section-title">2. Spesifikasi Alat Ganti (Type 4 - Type 6)</div>

                <div class="form-group">
                    <label>Jenis Part (Type 4)</label>
                    <input type="text" id="dType4" class="glass-input auto-name-trigger" placeholder="Cth: LCD, Bateri, Ribbon" list="partTypes">
                    <datalist id="partTypes">
                        <option value="LCD"></option><option value="Bateri"></option><option value="Ribbon"></option>
                        <option value="Motherboard"></option><option value="Kamera"></option><option value="Housing"></option>
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Jenama Part (Type 5)</label>
                    <input type="text" id="dType5" class="glass-input auto-name-trigger" placeholder="Cth: GX, Bemax, Yoobao">
                </div>
                <div class="form-group">
                    <label>Kualiti / Spesifikasi (Type 6)</label>
                    <input type="text" id="dType6" class="glass-input auto-name-trigger" placeholder="Cth: Ori Pulled, High Cap, Super AMOLED">
                </div>

                <div class="form-group full-width" style="background: rgba(59,130,246,0.1); padding: 15px; border-radius: 10px; border: 1px dashed rgba(59,130,246,0.3);">
                    <label style="color: #93c5fd; font-weight:bold;">Nama Barang Paparan (Auto-Generated)</label>
                    <input type="text" id="dName" class="glass-input" style="background:transparent; border:none; font-weight:bold; font-size:1.15rem; padding:0;" required>
                </div>

                <div class="section-title">3. Pembelian, Stok & Harga</div>

                <div class="form-group">
                    <label>Kod Barang ID</label>
                    <input type="text" id="dCode" class="glass-input" disabled title="Kod barang tidak boleh diubah">
                </div>
                <div class="form-group">
                    <label>Tarikh Terima</label>
                    <input type="date" id="dDate" class="glass-input">
                </div>
                <div class="form-group">
                    <label>Nama Supplier</label>
                    <input type="text" id="dSupplier" class="glass-input" placeholder="Cth: Pemborong KL">
                </div>

                <div class="form-group">
                    <label>Kuantiti Semasa (Stok)</label>
                    <input type="number" id="dQty" class="glass-input" required>
                </div>
                <div class="form-group">
                    <label>Harga Modal (RM)</label>
                    <input type="number" id="dCost" class="glass-input" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Harga Jual (RM) <span style="color:#fbbf24; font-size:0.75rem;">(Auto x2)</span></label>
                    <input type="number" id="dSell" class="glass-input" step="0.01" required>
                </div>

                <div class="form-group full-width">
                    <label>Deskripsi / Nota Tambahan</label>
                    <textarea id="dDesc" class="glass-input" placeholder="Tulis apa-apa nota penting tentang barang ini..."></textarea>
                </div>

                <button type="submit" id="saveDetailsBtn" class="btn-primary">💾 Kemaskini & Simpan Maklumat</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs",
            authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com",
            projectId: "ha-fix-tech-repair-8d27f",
            storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app",
            messagingSenderId: "630965976099",
            appId: "1:630965976099:web:9ff830cd7f5f624b060596",
            measurementId: "G-KJRGT6LQ43"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.replace("login.html"); });

        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');

        if (!itemId) {
            alert("Ralat: ID Barang tidak dijumpai.");
            window.location.href = "inventory.html";
        }

        // --- FUNGSI AUTO-NAMA BARANG ---
        const autoNameTriggers = document.querySelectorAll('.auto-name-trigger');
        autoNameTriggers.forEach(el => {
            el.addEventListener('input', generateAutoName);
        });

        function generateAutoName() {
            const brand = document.getElementById('dType2').value.trim();
            const model = document.getElementById('dType3').value.trim();
            const part = document.getElementById('dType4').value.trim();
            const partBrand = document.getElementById('dType5').value.trim();
            const spec = document.getElementById('dType6').value.trim();

            let finalName = [];
            if(brand) finalName.push(brand);
            if(model) finalName.push(model);
            if(part) finalName.push("- " + part);
            
            let bracketInfo = [];
            if(partBrand) bracketInfo.push(partBrand);
            if(spec) bracketInfo.push(spec);
            
            if(bracketInfo.length > 0) {
                finalName.push(`(${bracketInfo.join(', ')})`);
            }

            // Jika semua kosong, jangan override nama yang sedia ada
            if(finalName.length > 0) {
                document.getElementById('dName').value = finalName.join(' ');
            }
        }

        // --- FUNGSI AUTO-KIRA HARGA (MARKUP 100%) ---
        document.getElementById('dCost').addEventListener('input', function() {
            const costValue = parseFloat(this.value);
            if (!isNaN(costValue)) {
                document.getElementById('dSell').value = (costValue * 2).toFixed(2);
            }
        });

        // --- TARIK DATA INVENTORI DARI DB ---
        async function loadItemData() {
            try {
                const docSnap = await getDoc(doc(db, "inventory", itemId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    document.getElementById('dCode').value = docSnap.id;
                    
                    // Seksyen 1
                    document.getElementById('dCategory').value = data.category || "Alat Ganti";
                    document.getElementById('dType1').value = data.type1 || "";
                    document.getElementById('dType2').value = data.type2 || "";
                    document.getElementById('dType3').value = data.type3 || "";
                    
                    // Seksyen 2
                    document.getElementById('dType4').value = data.type4 || "";
                    document.getElementById('dType5').value = data.type5 || "";
                    document.getElementById('dType6').value = data.type6 || "";
                    document.getElementById('dName').value = data.itemName || "";
                    
                    // Seksyen 3
                    document.getElementById('dDate').value = data.receivingDate || "";
                    document.getElementById('dSupplier').value = data.supplier || "";
                    document.getElementById('dQty').value = data.stockQty || 0;
                    document.getElementById('dCost').value = data.costPrice || "";
                    document.getElementById('dSell').value = data.sellPrice || "";
                    document.getElementById('dDesc').value = data.description || "";

                } else {
                    alert("Rekod inventori tidak wujud.");
                    window.location.href = "inventory.html";
                }
            } catch (error) {
                console.error("Ralat ambil data:", error);
            }
        }

        loadItemData();

        // --- FUNGSI SIMPAN KEMASKINI ---
        document.getElementById('detailsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveDetailsBtn');
            btn.innerText = "Menyimpan..."; btn.style.opacity = "0.7";

            try {
                await updateDoc(doc(db, "inventory", itemId), {
                    type1: document.getElementById('dType1').value,
                    type2: document.getElementById('dType2').value,
                    type3: document.getElementById('dType3').value,
                    type4: document.getElementById('dType4').value,
                    type5: document.getElementById('dType5').value,
                    type6: document.getElementById('dType6').value,
                    itemName: document.getElementById('dName').value,
                    category: document.getElementById('dCategory').value,
                    receivingDate: document.getElementById('dDate').value,
                    supplier: document.getElementById('dSupplier').value,
                    stockQty: parseInt(document.getElementById('dQty').value),
                    costPrice: parseFloat(document.getElementById('dCost').value),
                    sellPrice: parseFloat(document.getElementById('dSell').value),
                    description: document.getElementById('dDesc').value,
                    updatedAt: new Date().toISOString()
                });

                alert("Maklumat inventori berjaya dikemaskini!");
            } catch (error) {
                alert("Gagal menyimpan: " + error.message);
            } finally {
                btn.innerText = "💾 Kemaskini & Simpan Maklumat"; btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
