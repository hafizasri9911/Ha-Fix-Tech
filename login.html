<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | HA-FIX Tech & Repair</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #0b1121; 
            --glass-bg: rgba(25, 33, 60, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --text-main: #ffffff; 
            --text-muted: #94a3b8; 
            --accent-blue: #3b82f6; 
            --accent-purple: #8b5cf6; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top left, #172033, var(--bg-color)); 
            color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; overflow: hidden; 
        }
        
        .blob { position: absolute; filter: blur(100px); z-index: -1; opacity: 0.6; }
        .blob.blue { top: -5%; left: 15%; width: 500px; height: 500px; background: var(--accent-blue); }
        .blob.purple { bottom: -5%; right: 15%; width: 400px; height: 400px; background: var(--accent-purple); }

        /* Navigasi Atas (Butang Back & Bahasa) */
        .top-nav { position: absolute; top: 30px; right: 50px; display: flex; align-items: center; gap: 10px; background: var(--glass-bg); padding: 5px; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .lang-btn { background: transparent; color: var(--text-main); border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-weight: 600; transition: 0.3s; opacity: 0.5; text-decoration: none; display: inline-block; font-size: 0.9rem;}
        .lang-btn.active, .lang-btn:hover { background: var(--accent-blue); opacity: 1; }
        .nav-divider { width: 1px; height: 20px; background: var(--glass-border); margin: 0 5px; }

        .login-card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; padding: 3.5rem; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .logo-area h1 { font-size: 2.2rem; background: -webkit-linear-gradient(left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .logo-area p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2.5rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
        
        .glass-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; }
        .glass-input:focus { border-color: var(--accent-blue); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-submit:hover { box-shadow: 0 10px 25px rgba(139, 92, 246, 0.5); transform: translateY(-3px); }

        .footer-info { margin-top: 2rem; font-size: 0.8rem; color: var(--text-muted); text-align: center; }
    </style>
</head>
<body>

    <div class="blob blue"></div>
    <div class="blob purple"></div>

    <div class="top-nav">
        <a href="index.html" class="lang-btn lang" data-en="← Home" data-ms="← Utama" style="opacity: 0.8;">← Home</a>
        
        <div class="nav-divider"></div>
        
        <button id="btn-en" class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button id="btn-ms" class="lang-btn" onclick="setLanguage('ms')">MS</button>
    </div>

    <div class="login-card">
        <div class="logo-area">
            <h1>HA-FIX TECH</h1>
            <p class="lang" data-en="Admin Portal Authentication" data-ms="Pengesahan Portal Admin">Admin Portal Authentication</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="lang" data-en="Admin Email" data-ms="E-mel Admin">Admin Email</label>
                <input type="email" id="adminEmail" class="glass-input" placeholder="admin@hafix.com" required>
            </div>
            
            <div class="form-group">
                <label class="lang" data-en="Password" data-ms="Kata Laluan">Password</label>
                <input type="password" id="adminPassword" class="glass-input" placeholder="••••••••" required>
            </div>

            <button type="submit" id="loginBtn" class="btn-submit lang" data-en="Secure Login" data-ms="Log Masuk Selamat">Secure Login</button>
        </form>
    </div>

    <div class="footer-info">
        <p>HA-FIX Tech & Repair (202503246898)</p>
    </div>

    <script type="module">
        // Fungsi Dwibahasa
        window.setLanguage = function(lang) {
            const elements = document.querySelectorAll('.lang');
            elements.forEach(el => {
                if(el.getAttribute(`data-${lang}`)) {
                    if (el.tagName === 'INPUT') {
                        el.placeholder = el.getAttribute(`data-${lang}`);
                    } else {
                        el.innerText = el.getAttribute(`data-${lang}`);
                    }
                }
            });
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById('btn-ms').classList.remove('active');
            document.getElementById(`btn-${lang}`).classList.add('active');
        }

        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs",
            authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com",
            projectId: "ha-fix-tech-repair-8d27f",
            storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app",
            messagingSenderId: "630965976099",
            appId: "1:630965976099:web:9ff830cd7f5f624b060596",
            measurementId: "G-KJRGT6LQ43"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Fungsi Log Masuk
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const btnSubmit = document.getElementById('loginBtn');
            
            btnSubmit.innerText = "Sila Tunggu...";
            btnSubmit.style.opacity = "0.7";

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    alert("Gagal: Sila semak semula e-mel dan kata laluan anda.");
                    console.error(error.message);
                    btnSubmit.innerText = "Secure Login";
                    btnSubmit.style.opacity = "1";
                });
        });
    </script>
</body>
</html>
