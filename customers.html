<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads & Quotes | HA-FIX Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg-color: #0b1121; --glass-bg: rgba(25, 33, 60, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top left, #172033, var(--bg-color)); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.5; }
        .blob.blue { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--accent-blue); }
        .blob.purple { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--accent-purple); }
        
        /* SIDEBAR BASE */
        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; z-index: 2500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .company-info h2 { font-size: 1.2rem; background: -webkit-linear-gradient(left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .company-info p { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .nav-menu li a { text-decoration: none; color: var(--text-muted); padding: 12px 16px; border-radius: 12px; display: block; transition: 0.3s; font-weight: 600; font-size: 0.9rem; }
        .nav-menu li a:hover, .nav-menu li a.active { background: rgba(59, 130, 246, 0.15); color: var(--text-main); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; position: relative; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; font-weight: 700; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        
        /* TABLE & FILTERS */
        .filter-section { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 200px; }
        .filter-box { width: 150px; }
        
        .glass-table { width: 100%; border-collapse: collapse; }
        .glass-table th, .glass-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--glass-border); vertical-align: top; }
        .glass-table th { color: var(--text-muted); font-size: 0.9rem; }
        
        /* STATUS & BUTTONS */
        .status-baru { color: #fbbf24; font-weight: bold; }
        .status-sebutharga { color: #60a5fa; font-weight: bold; }
        .status-proceed { color: #34d399; font-weight: bold; }
        .action-group { display: flex; flex-direction: column; gap: 5px; }
        .btn-action { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; font-weight: bold; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .glass-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: var(--text-main); outline: none; margin-bottom: 15px; }

        /* MOBILE FIXES */
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 3000; background: var(--accent-blue); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2400; }

        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            body { flex-direction: column; }
            .sidebar { position: fixed; left: -100%; top: 0; height: 100vh; width: 280px; box-shadow: 15px 0 30px rgba(0,0,0,0.5); }
            .sidebar.active { left: 0; }
            .sidebar-overlay.active { display: block; }
            .main-content { padding: 1.5rem; padding-top: 4.5rem; }
            .header h1 { font-size: 1.5rem; }
            .glass-panel { padding: 1.2rem; overflow-x: auto; }
            .glass-table { min-width: 800px; } /* Ensure table info is readable by horizontal scroll */
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-box { width: 100%; }
            .search-box { width: 100%; }
        }

        /* PRINT PREVIEW (HIDDEN BY DEFAULT) */
        #previewBackdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 4000; overflow-y: auto; padding: 20px; justify-content: center; }
        #invoice-template { width: 210mm; min-height: 297mm; padding: 15mm 20mm; background: #ffffff; color: #000000; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="blob blue"></div>
    <div class="blob purple"></div>

    <button class="menu-toggle" id="menuBtn">☰ MENU</button>
    <div class="sidebar-overlay" id="overlay"></div>

    <aside class="sidebar">
        <div class="company-info">
            <h2>HA-FIX TECH</h2>
            <p>202503246898 (003772792-K)<br>Kuala Nerus, Terengganu</p>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="customers.html" class="active">Leads & Quotes</a></li>
            <li><a href="services.html">Active Repairs</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="finance.html">Finance</a></li>
            <li style="margin-top: 20px;"><a href="#" onclick="logoutAdmin()" style="color: #f87171;">Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Leads & Quotations</h1>
        </header>

        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0; font-size: 1.1rem;">Customer Inquiries</h2>
                <button class="btn-action" onclick="document.getElementById('custModal').style.display='flex'">+ Manual Lead</button>
            </div>
            
            <div class="filter-section">
                <input type="text" id="searchInput" class="glass-input search-box" placeholder="Search name or phone..." style="margin-bottom:0;">
                <select id="statusFilter" class="glass-input filter-box" style="margin-bottom:0; background-color: #172033; color: white;">
                    <option value="All">All Statuses</option>
                    <option value="Baru">New</option>
                    <option value="Sebut Harga">Quoted</option>
                    <option value="Proceed">Proceeded</option>
                    <option value="Batal">Cancelled</option>
                </select>
                <button onclick="exportCSV()" class="btn-action" style="background: #10b981; border:none; height: 45px;">📥 Export CSV</button>
            </div>

            <table class="glass-table">
                <thead>
                    <tr>
                        <th width="15%">Date</th>
                        <th width="25%">Customer Info</th>
                        <th width="25%">Device & Issue</th>
                        <th width="20%">Status</th>
                        <th width="15%">Action</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <tr><td colspan="5" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="custModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 3500; justify-content: center; align-items: center; padding: 20px;">
        <div class="glass-panel" style="width: 100%; max-width: 450px; position: relative; margin-bottom: 0;">
            <button onclick="document.getElementById('custModal').style.display='none'" style="position: absolute; right: 20px; top: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h2 style="margin-bottom: 20px;">Manual Lead</h2>
            <form id="newCustForm">
                <input type="text" id="cName" class="glass-input" placeholder="Customer Name" required>
                <input type="tel" id="cPhone" class="glass-input" placeholder="Phone Number" required>
                <input type="text" id="cDevice" class="glass-input" placeholder="Device Model" required>
                <input type="text" id="cIssue" class="glass-input" placeholder="Issue / Notes" required>
                <button type="submit" id="saveCustBtn" class="btn-primary">Save Customer</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs", authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com", projectId: "ha-fix-tech-repair-8d27f", storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app", messagingSenderId: "630965976099", appId: "1:630965976099:web:9ff830cd7f5f624b060596", measurementId: "G-KJRGT6LQ43" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.replace("login.html"); });
        window.logoutAdmin = () => { if(confirm("Logout?")) signOut(auth).then(() => window.location.replace("login.html")); };

        // MOBILE MENU LOGIC
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('overlay');
        function toggleMenu() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); menuBtn.innerText = sidebar.classList.contains('active') ? '✕ CLOSE' : '☰ MENU'; }
        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        let allCustomers = [];
        onSnapshot(query(collection(db, "customers"), orderBy("createdAt", "desc")), (snap) => {
            allCustomers = []; snap.forEach(d => allCustomers.push({ id: d.id, ...d.data() }));
            renderTable();
        });

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('statusFilter').value;
            const tbody = document.getElementById('customersTableBody');
            tbody.innerHTML = "";
            
            const filtered = allCustomers.filter(c => 
                ((c.name && c.name.toLowerCase().includes(search)) || (c.phone && c.phone.includes(search))) && 
                (filter === "All" ? true : (c.status || "Baru") === filter)
            );

            if(filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No records.</td></tr>`; return; }

            filtered.forEach(data => {
                const tr = document.createElement('tr');
                const dbStatus = data.status || "Baru";
                let statusText = "New", statusClass = "status-baru";
                if(dbStatus === "Sebut Harga") { statusText = "Quoted"; statusClass = "status-sebutharga"; }
                else if(dbStatus === "Proceed") { statusText = "Proceeded"; statusClass = "status-proceed"; }
                else if(dbStatus === "Batal") { statusText = "Cancelled"; statusClass = ""; }

                const actionBtns = `<div class="action-group">
                    <button class="btn-action" onclick="window.location.href='customer-details.html?id=${data.id}'">🔍 Details</button>
                    ${dbStatus !== 'Proceed' ? `<button class="btn-action" style="color:#fbbf24;" onclick="cancelLead('${data.id}')">❌ Cancel</button>` : ''}
                </div>`;

                tr.innerHTML = `
                    <td>${new Date(data.createdAt).toLocaleDateString('en-MY')}</td>
                    <td><strong>${data.name}</strong><br><small>${data.phone}</small></td>
                    <td>${data.device}<br><small>${data.issue}</small></td>
                    <td><span class="${statusClass}">${statusText}</span></td>
                    <td>${actionBtns}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        document.getElementById('searchInput').oninput = renderTable;
        document.getElementById('statusFilter').onchange = renderTable;

        window.cancelLead = async (id) => { if(confirm("Cancel lead?")) await updateDoc(doc(db, "customers", id), { status: "Batal" }); };

        document.getElementById('newCustForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "customers"), {
                name: document.getElementById('cName').value, phone: document.getElementById('cPhone').value,
                device: document.getElementById('cDevice').value, issue: document.getElementById('cIssue').value,
                status: "Baru", createdAt: new Date().toISOString()
            });
            document.getElementById('custModal').style.display = 'none';
            document.getElementById('newCustForm').reset();
        };
    </script>
</body>
</html>
