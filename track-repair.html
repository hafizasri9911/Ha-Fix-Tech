<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jejak Status Pembaikan | HA-FIX Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b1121; --glass-bg: rgba(25, 33, 60, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top left, #172033, var(--bg-color)); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; position: relative; }
        
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.5; }
        .blob.blue { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--accent-blue); }
        .blob.purple { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--accent-purple); }

        /* Butang Kembali */
        .btn-back-home { position: absolute; top: 30px; left: 30px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 10px 20px; border-radius: 12px; text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; z-index: 100; backdrop-filter: blur(10px); }
        .btn-back-home:hover { background: rgba(255,255,255,0.2); transform: translateX(-5px); border-color: var(--accent-blue); }
        
        @media (max-width: 600px) {
            .btn-back-home { top: 15px; left: 15px; padding: 8px 15px; font-size: 0.85rem; }
        }

        .track-container { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 3rem 2rem; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; position: relative; z-index: 10; margin-top: 40px; }
        
        .logo-box { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: 800; font-size: 14px; letter-spacing: 1px; color: #94a3b8; }
        .track-container h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; letter-spacing: 0.5px; }
        .track-container p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2.5rem; line-height: 1.5; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding-left: 5px;}

        .glass-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 2px solid var(--glass-border); padding: 15px; border-radius: 12px; color: var(--text-main); outline: none; transition: 0.3s; font-size: 1.1rem; letter-spacing: 1px; font-weight: 600; }
        .glass-input:focus { border-color: var(--accent-blue); background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .glass-input::placeholder { color: #475569; font-weight: 400; font-size: 1rem; }
        
        #ticketIdInput { text-transform: uppercase; font-size: 1.2rem; letter-spacing: 3px; font-weight: 700; }
        #ticketIdInput::placeholder { letter-spacing: 1px; text-transform: none; }

        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 15px 24px; border-radius: 12px; cursor: pointer; font-weight: 800; transition: 0.3s; width: 100%; font-size: 1.1rem; letter-spacing: 0.5px; margin-top: 10px; }
        .btn-primary:hover { box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5); transform: translateY(-2px); }

        .result-card { display: none; margin-top: 2.5rem; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; text-align: left; animation: fadeIn 0.5s ease-in-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-header { border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        .result-header h3 { font-size: 1.3rem; color: #93c5fd; margin: 0; }
        
        .detail-row { margin-bottom: 12px; font-size: 0.95rem; }
        .detail-row span { color: var(--text-muted); display: block; font-size: 0.8rem; margin-bottom: 2px; }
        .detail-row strong { color: var(--text-main); font-size: 1.05rem; }

        .status-box { margin-top: 25px; padding: 15px; border-radius: 12px; text-align: center; font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; border: 2px solid transparent; }
        
        .status-waiting { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.4); color: #fbbf24; }
        .status-repairing { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.4); color: #60a5fa; }
        .status-done { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.4); color: #34d399; }
    </style>
</head>
<body>
    <div class="blob blue"></div>
    <div class="blob purple"></div>

    <a href="index.html" class="btn-back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Kembali
    </a>

    <div class="track-container">
        <div class="logo-box">LOGO</div>
        <h1>HA-FIX TECH</h1>
        <p>Sila masukkan maklumat di bawah untuk menyemak status pembaikan terkini peranti anda.</p>

        <form id="trackForm">
            <div class="form-group">
                <label>No. Rujukan Tiket</label>
                <input type="text" id="ticketIdInput" class="glass-input" placeholder="Cth: HF-1234" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Nombor Telefon (Pengesahan Keselamatan)</label>
                <input type="tel" id="phoneInput" class="glass-input" placeholder="Cth: 0123456789" required autocomplete="off">
            </div>

            <button type="submit" id="searchBtn" class="btn-primary">🔍 Semak Status</button>
        </form>

        <div id="resultCard" class="result-card">
            <div class="result-header">
                <h3>Tiket: <span id="rTicketId"></span></h3>
            </div>
            
            <div class="detail-row">
                <span>Pelanggan:</span>
                <strong id="rName"></strong>
            </div>
            <div class="detail-row">
                <span>Model Peranti:</span>
                <strong id="rDevice"></strong>
            </div>
            <div class="detail-row">
                <span>Aduan Kerosakan:</span>
                <strong id="rIssue"></strong>
            </div>
            
            <div id="rStatusBox" class="status-box">
                <div style="font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; opacity: 0.8; letter-spacing: 0;">STATUS TERKINI:</div>
                <span id="rStatusText"></span>
            </div>
            
            <p id="rCollectMsg" style="display: none; margin-top: 15px; font-size: 0.85rem; color: #34d399; text-align: center; font-weight: 600;">
                Peranti anda sedia untuk diambil. Sila bawa resit atau tunjukkan tiket ini di kaunter.
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Konfigurasi Database HA-FIX Tech
        const firebaseConfig = {
            apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs",
            authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com",
            projectId: "ha-fix-tech-repair-8d27f",
            storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app",
            messagingSenderId: "630965976099",
            appId: "1:630965976099:web:9ff830cd7f5f624b060596",
            measurementId: "G-KJRGT6LQ43"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('trackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Ambil input No Tiket
            let ticketId = document.getElementById('ticketIdInput').value.trim().toUpperCase();
            if (!ticketId.startsWith("HF-") && /^\d+$/.test(ticketId)) {
                ticketId = "HF-" + ticketId;
            }

            // 2. Ambil input No Telefon (Buang semua simbol/jarak tinggalkan nombor sahaja)
            const inputPhoneRaw = document.getElementById('phoneInput').value;
            const inputPhoneClean = inputPhoneRaw.replace(/\D/g, '');

            const btn = document.getElementById('searchBtn');
            const resultCard = document.getElementById('resultCard');
            
            btn.innerText = "⏳ Mencari Data...";
            btn.style.opacity = "0.7";
            resultCard.style.display = 'none';

            try {
                // Pergi cari fail tiket di dalam database
                const docRef = doc(db, "tickets", ticketId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Ambil no telefon dari database dan bersihkan untuk perbandingan
                    const dbPhoneClean = (data.phone || "").replace(/\D/g, '');

                    // LOGIK KESELAMATAN (SECURITY CHECK)
                    const isPhoneMatch = inputPhoneClean === dbPhoneClean || 
                                         (inputPhoneClean.length >= 9 && dbPhoneClean.endsWith(inputPhoneClean.slice(-9)));

                    if (isPhoneMatch) {
                        // LULUS KESELAMATAN: Papar data penuh
                        document.getElementById('rTicketId').innerText = ticketId;
                        document.getElementById('rName').innerText = data.name || "Tidak Nyata";
                        document.getElementById('rDevice').innerText = data.device || "Tidak Nyata";
                        document.getElementById('rIssue').innerText = data.issue || "Tidak Nyata";

                        // Logik Warna Status
                        const statusBox = document.getElementById('rStatusBox');
                        const statusText = document.getElementById('rStatusText');
                        const collectMsg = document.getElementById('rCollectMsg');
                        const currentStatus = data.status || "Sedang Dibaiki";
                        
                        // Reset kelas warna
                        statusBox.className = "status-box";
                        collectMsg.style.display = "none";

                        if (currentStatus === "Menunggu Alat Ganti") {
                            statusBox.classList.add("status-waiting");
                            statusText.innerText = "MENUNGGU ALAT GANTI";
                        } else if (currentStatus === "Siap") {
                            statusBox.classList.add("status-done");
                            statusText.innerText = "SIAP & SEDIA DIAMBIL";
                            collectMsg.style.display = "block"; // Tunjuk mesej suruh ambil
                        } else {
                            statusBox.classList.add("status-repairing");
                            statusText.innerText = "SEDANG DIBAIKI";
                        }

                        // Tunjuk Kad
                        resultCard.style.display = 'block';

                    } else {
                        // GAGAL KESELAMATAN: No telefon tak sama
                        alert("⚠️ Ralat Keselamatan: Nombor Telefon yang dimasukkan tidak sepadan dengan rekod tiket ini.");
                    }

                } else {
                    alert("❌ Tiket tidak dijumpai! Sila pastikan ejaan dan format nombor tiket betul (Cth: HF-1234).");
                }
            } catch (error) {
                alert("Ralat sambungan: " + error.message);
            } finally {
                btn.innerText = "🔍 Semak Status";
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
