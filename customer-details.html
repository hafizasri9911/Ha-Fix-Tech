<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details | HA-FIX Tech & Repair</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b1121; --glass-bg: rgba(25, 33, 60, 0.4); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #ffffff; --text-muted: #94a3b8; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top left, #172033, var(--bg-color)); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .blob { position: absolute; filter: blur(90px); z-index: -1; opacity: 0.5; }
        .blob.blue { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--accent-blue); }
        .blob.purple { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--accent-purple); }
        
        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
        .company-info h2 { font-size: 1.2rem; background: -webkit-linear-gradient(left, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .company-info p { font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .nav-menu li a { text-decoration: none; color: var(--text-muted); padding: 12px 16px; border-radius: 12px; display: block; transition: 0.3s; font-weight: 600; font-size: 0.9rem; }
        .nav-menu li a:hover, .nav-menu li a.active { background: rgba(59, 130, 246, 0.15); color: var(--text-main); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2rem; font-weight: 700; display: flex; align-items: center; gap: 15px;}
        
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .btn-back:hover { background: rgba(255,255,255,0.2); }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; }
        
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 900px) { .details-grid { grid-template-columns: 1fr; } }

        .section-title { font-size: 1.1rem; color: var(--accent-blue); margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        
        .glass-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: var(--text-main); outline: none; transition: 0.3s; font-size: 0.95rem; }
        .glass-input:focus { border-color: var(--accent-blue); background: rgba(255, 255, 255, 0.1); }
        textarea.glass-input { resize: vertical; min-height: 80px; }

        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; font-size: 1rem; margin-top: 1rem; }
        .btn-primary:hover { box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); transform: translateY(-2px); }
        
        .btn-action { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; color: #93c5fd; padding: 12px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-action:hover { background: #3b82f6; color: white; }

        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; background: rgba(255,255,255,0.1); }
        
        .inv-search-box { background: rgba(59, 130, 246, 0.05); border: 1px dashed rgba(59, 130, 246, 0.4); padding: 15px; border-radius: 12px; margin-bottom: 1.5rem; }
        .inv-search-box label { color: #93c5fd; font-weight: bold; }

        .cost-breakdown { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 1.5rem; }
        .cost-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: flex-end; }
        .cost-row .form-group { flex: 1; min-width: 150px; margin-bottom: 0; }
        
        .quick-select { padding: 8px; font-size: 0.8rem; background-color: #172033; margin-bottom: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="blob blue"></div>
    <div class="blob purple"></div>

    <aside class="sidebar">
        <div class="company-info">
            <h2>HA-FIX TECH</h2>
            <p>202503246898 (003772792-K)<br>Kuala Nerus, Terengganu</p>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="customers.html" class="active">Leads & Quotes</a></li>
            <li><a href="services.html">Active Repairs</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="finance.html">Finance</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>
                <a href="#" onclick="history.back(); return false;" class="btn-back">← Kembali</a> 
                Maklumat Terperinci Pelanggan
            </h1>
        </header>

        <div class="glass-panel">
            <div id="statusDisplay" class="status-badge">Memuatkan...</div>

            <form id="detailsForm">
                <div class="details-grid">
                    <div>
                        <h3 class="section-title">Maklumat Asas & Peranti</h3>
                        
                        <div class="form-group">
                            <label>Nama Pelanggan</label>
                            <input type="text" id="dName" class="glass-input" required>
                        </div>
                        <div class="form-group">
                            <label>Nombor Telefon</label>
                            <input type="tel" id="dPhone" class="glass-input" required>
                        </div>
                        <div class="form-group">
                            <label>Model Peranti</label>
                            <input type="text" id="dDevice" class="glass-input" required>
                        </div>
                        <div class="form-group">
                            <label>Aduan Asal / Kerosakan (Dari Pelanggan)</label>
                            <textarea id="dIssue" class="glass-input" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>Hasil Pemeriksaan (Diagnosis Technician)</label>
                            <textarea id="dTechRemarks" class="glass-input" placeholder="Cth: Skrin pecah teruk, Face ID rosak, bateri kembung..."></textarea>
                        </div>
                    </div>

                    <div>
                        <h3 class="section-title">Sebut Harga & Alat Ganti</h3>
                        
                        <div class="inv-search-box">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label>🔍 Cari & Tambah Dari Inventori</label>
                                
                                <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">
                                    <select id="invCatFilter" class="glass-input" style="flex:1; min-width: 110px; margin-bottom: 0; padding: 10px; background-color: #172033; cursor: pointer; font-size: 0.8rem;">
                                        <option value="All">Kategori (Semua)</option>
                                        <option value="Alat Ganti">Alat Ganti</option>
                                        <option value="Aksesori">Aksesori</option>
                                        <option value="Peralatan">Peralatan</option>
                                    </select>

                                    <select id="invBrandFilter" class="glass-input" style="flex:1; min-width: 110px; margin-bottom: 0; padding: 10px; background-color: #172033; cursor: pointer; font-size: 0.8rem;">
                                        <option value="All">Jenama (Semua)</option>
                                    </select>

                                    <select id="invPartFilter" class="glass-input" style="flex:1; min-width: 110px; margin-bottom: 0; padding: 10px; background-color: #172033; cursor: pointer; font-size: 0.8rem;">
                                        <option value="All">Part (Semua)</option>
                                    </select>
                                </div>

                                <div style="display: flex; gap: 8px; align-items: stretch; margin-top: 10px;">
                                    <input type="text" id="invSearch" list="invList" class="glass-input" placeholder="Pilih alat ganti..." style="margin-bottom:0; flex:1; min-width: 150px;">
                                    <datalist id="invList"></datalist>
                                    
                                    <button type="button" id="addPartBtn" class="btn-action">➕ Tambah</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Senarai Perkara / Alat Ganti (Boleh edit manual)</label>
                            <textarea id="dPartsList" class="glass-input" placeholder="Cth: 1x LCD OLED (GX), 1x Bateri (Yoobao)" style="min-height: 120px;"></textarea>
                        </div>

                        <div class="cost-breakdown">
                            <label style="color: #93c5fd; font-weight: bold; margin-bottom: 10px; display: block; font-size: 0.9rem;">💰 Pecahan Kos (Quotation)</label>
                            
                            <div class="cost-row">
                                <div class="form-group">
                                    <label>Alat Ganti (RM)</label>
                                    <div style="height: 38px;"></div> <input type="number" id="dPartsTotal" class="glass-input cost-input" step="0.01" placeholder="0.00" value="0.00">
                                </div>
                                
                                <div class="form-group">
                                    <label>Caj Servis / Upah (RM)</label>
                                    <select id="quickService" class="glass-input quick-select">
                                        <option value="">-- Pilih Servis Pantas --</option>
                                        <optgroup label="💻 Laptop: Software">
                                            <option value="50" data-name="Format & Pasang OS">Format & Pasang OS (RM50 - RM80)</option>
                                            <option value="40" data-name="Buang Virus & Malware">Buang Virus & Malware (RM40 - RM70)</option>
                                            <option value="40" data-name="Password Removal">Password Removal (RM40 - RM60)</option>
                                        </optgroup>
                                        <optgroup label="💻 Laptop: Hardware">
                                            <option value="30" data-name="Tukar Bateri Laptop">Tukar Bateri (RM30 - RM50)</option>
                                            <option value="40" data-name="Tukar Skrin & LCD Laptop">Tukar Skrin & LCD (RM40 - RM80)</option>
                                            <option value="30" data-name="Tukar Keyboard">Tukar Keyboard (RM30 - RM60)</option>
                                            <option value="30" data-name="Tukar Kipas">Tukar Kipas (RM30 - RM50)</option>
                                            <option value="30" data-name="Upgrade RAM & SSD">Upgrade RAM & SSD (RM30 - RM50)</option>
                                            <option value="30" data-name="Cuci Habuk & Thermal Paste">Cuci & Thermal Paste (RM30 - RM50)</option>
                                        </optgroup>
                                        <optgroup label="📱 Telefon: Software">
                                            <option value="40" data-name="Flash Software">Flash Software (RM40 - RM70)</option>
                                            <option value="30" data-name="Pembersihan Storan & System Lock">System Lock / Cuci (RM30 - RM60)</option>
                                        </optgroup>
                                        <optgroup label="📱 Telefon: Hardware">
                                            <option value="30" data-name="Tukar Bateri Telefon">Tukar Bateri (RM30 - RM50)</option>
                                            <option value="40" data-name="Tukar Skrin & LCD Telefon">Tukar Skrin & LCD (RM40 - RM80)</option>
                                            <option value="40" data-name="Tukar Charging Port">Tukar Charging Port (RM40 - RM70)</option>
                                            <option value="40" data-name="Lain-lain Servis Hardware">Lain-lain (RM40 - RM80)</option>
                                        </optgroup>
                                    </select>
                                    <input type="number" id="dServiceCharge" class="glass-input cost-input" step="0.01" placeholder="Taip/Edit Manual" value="0.00">
                                </div>
                                
                                <div class="form-group">
                                    <label>Caj Perjalanan (RM)</label>
                                    <select id="quickDelivery" class="glass-input quick-select">
                                        <option value="">-- Jarak Servis --</option>
                                        <option value="0">Bawah 10 km (Percuma)</option>
                                        <option value="10">10 - 20 km (RM10.00)</option>
                                        <option value="15">20 - 30 km (RM15.00)</option>
                                    </select>
                                    <input type="number" id="dDeliveryCharge" class="glass-input cost-input" step="0.01" placeholder="Taip/Edit Manual" value="0.00">
                                </div>
                            </div>

                            <div class="form-group" style="margin-bottom: 0; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; margin-top: 5px;">
                                <label>Jumlah Keseluruhan (RM)</label>
                                <input type="number" id="dQuotePrice" class="glass-input" step="0.01" placeholder="0.00" readonly style="font-size: 1.5rem; font-weight: bold; color: #34d399; margin-bottom: 0; background: rgba(16, 185, 129, 0.1); border-color: #10b981;">
                            </div>
                        </div>

                        <button type="submit" id="saveDetailsBtn" class="btn-primary">💾 Simpan & Kemaskini Maklumat</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDglejBPoHxyhK9t74UCmY90aAs3iaeNSs",
            authDomain: "ha-fix-tech-repair-8d27f.firebaseapp.com",
            projectId: "ha-fix-tech-repair-8d27f",
            storageBucket: "ha-fix-tech-repair-8d27f.firebasestorage.app",
            messagingSenderId: "630965976099",
            appId: "1:630965976099:web:9ff830cd7f5f624b060596",
            measurementId: "G-KJRGT6LQ43"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => { if (!user) window.location.replace("login.html"); });

        const urlParams = new URLSearchParams(window.location.search);
        const custId = urlParams.get('id');

        if (!custId) {
            alert("Ralat: ID Pelanggan tidak dijumpai.");
            window.location.href = "customers.html";
        }

        // ==========================================
        // FUNGSI AUTO-KIRA JUMLAH BESAR (TOTAL)
        // ==========================================
        function calculateTotalQuote() {
            const parts = parseFloat(document.getElementById('dPartsTotal').value) || 0;
            const service = parseFloat(document.getElementById('dServiceCharge').value) || 0;
            const delivery = parseFloat(document.getElementById('dDeliveryCharge').value) || 0;
            
            const total = parts + service + delivery;
            document.getElementById('dQuotePrice').value = total.toFixed(2);
        }

        // Dengar perubahan manual pada kotak harga
        document.querySelectorAll('.cost-input').forEach(input => {
            input.addEventListener('input', calculateTotalQuote);
        });

        // ==========================================
        // FUNGSI QUICK SELECT DROPDOWN (SERVIS & PERJALANAN)
        // ==========================================
        document.getElementById('quickService').addEventListener('change', function() {
            if(this.value !== "") {
                const basePrice = parseFloat(this.value);
                const serviceName = this.options[this.selectedIndex].getAttribute('data-name');
                
                // Isi harga ke dalam kotak (Boleh di-edit manual lepas ni)
                document.getElementById('dServiceCharge').value = basePrice.toFixed(2);
                calculateTotalQuote();

                // Tambah nota servis ke dalam kotak teks (Jika belum ada)
                const partsList = document.getElementById('dPartsList');
                if(!partsList.value.includes(serviceName)) {
                    const newText = `- Upah Servis: ${serviceName}`;
                    partsList.value = partsList.value ? partsList.value + '\n' + newText : newText;
                }
            }
        });

        document.getElementById('quickDelivery').addEventListener('change', function() {
            if(this.value !== "") {
                const basePrice = parseFloat(this.value);
                document.getElementById('dDeliveryCharge').value = basePrice.toFixed(2);
                calculateTotalQuote();
            }
        });

        // ==========================================
        // 1. FUNGSI TARIK DATA INVENTORI & DINAMIK FILTER
        // ==========================================
        let inventoryData = [];
        const invList = document.getElementById('invList');
        const invCatFilter = document.getElementById('invCatFilter');
        const invBrandFilter = document.getElementById('invBrandFilter');
        const invPartFilter = document.getElementById('invPartFilter');
        const invSearch = document.getElementById('invSearch');

        function populateDynamicFilters() {
            const brands = new Set();
            const parts = new Set();
            
            inventoryData.forEach(item => {
                if(item.type2 && item.type2.trim() !== "") brands.add(item.type2);
                if(item.type4 && item.type4.trim() !== "") parts.add(item.type4);
            });

            const currentBrand = invBrandFilter.value;
            const currentPart = invPartFilter.value;

            invBrandFilter.innerHTML = '<option value="All">Jenama (Semua)</option>';
            [...brands].sort().forEach(b => { invBrandFilter.innerHTML += `<option value="${b}">${b}</option>`; });
            invBrandFilter.value = brands.has(currentBrand) ? currentBrand : "All";

            invPartFilter.innerHTML = '<option value="All">Part (Semua)</option>';
            [...parts].sort().forEach(p => { invPartFilter.innerHTML += `<option value="${p}">${p}</option>`; });
            invPartFilter.value = parts.has(currentPart) ? currentPart : "All";
        }

        function updateDatalist() {
            const selectedCat = invCatFilter.value;
            const selectedBrand = invBrandFilter.value;
            const selectedPart = invPartFilter.value;
            
            invList.innerHTML = ""; 
            
            inventoryData.forEach(item => {
                const matchCat = selectedCat === "All" || item.category === selectedCat;
                const matchBrand = selectedBrand === "All" || item.type2 === selectedBrand;
                const matchPart = selectedPart === "All" || item.type4 === selectedPart;

                if(matchCat && matchBrand && matchPart) {
                    const option = document.createElement('option');
                    option.value = `[${item.id}] ${item.itemName} - RM ${parseFloat(item.sellPrice).toFixed(2)}`;
                    invList.appendChild(option);
                }
            });
            invSearch.value = ""; 
        }

        invCatFilter.addEventListener('change', updateDatalist);
        invBrandFilter.addEventListener('change', updateDatalist);
        invPartFilter.addEventListener('change', updateDatalist);

        const qInv = query(collection(db, "inventory"), orderBy("itemName"));
        onSnapshot(qInv, (snapshot) => {
            inventoryData = [];
            snapshot.forEach((doc) => {
                inventoryData.push({ id: doc.id, ...doc.data() });
            });
            populateDynamicFilters(); 
            updateDatalist();         
        });


        // ==========================================
        // 2. FUNGSI TAMBAH PART & AUTO MASUK HARGA
        // ==========================================
        document.getElementById('addPartBtn').addEventListener('click', () => {
            const searchVal = invSearch.value;
            if(!searchVal) return;

            const match = searchVal.match(/\[(.*?)\]/);
            if(match && match[1]) {
                const itemId = match[1];
                const item = inventoryData.find(i => i.id === itemId);
                
                if(item) {
                    const currentParts = document.getElementById('dPartsList').value;
                    const newPartText = `- Alat Ganti: 1x ${item.itemName} (RM ${parseFloat(item.sellPrice).toFixed(2)})`;
                    document.getElementById('dPartsList').value = currentParts ? currentParts + '\n' + newPartText : newPartText;

                    const currentPartsTotal = parseFloat(document.getElementById('dPartsTotal').value) || 0;
                    const newPartsTotal = currentPartsTotal + parseFloat(item.sellPrice);
                    document.getElementById('dPartsTotal').value = newPartsTotal.toFixed(2);
                    
                    calculateTotalQuote();
                    invSearch.value = ""; 
                }
            } else {
                alert("Sila pilih alat ganti yang sah dari senarai.");
            }
        });


        // ==========================================
        // 3. FUNGSI TARIK DATA PELANGGAN
        // ==========================================
        async function loadCustomerData() {
            try {
                const docSnap = await getDoc(doc(db, "customers", custId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    document.getElementById('dName').value = data.name || "";
                    document.getElementById('dPhone').value = data.phone || "";
                    document.getElementById('dDevice').value = data.device || "";
                    document.getElementById('dIssue').value = data.issue || "";
                    
                    document.getElementById('dTechRemarks').value = data.techRemarks || "";
                    document.getElementById('dPartsList').value = data.partsList || "";
                    
                    // Tarik pecahan kos
                    document.getElementById('dPartsTotal').value = data.partsTotal || "0.00";
                    document.getElementById('dServiceCharge').value = data.serviceCharge || "0.00";
                    document.getElementById('dDeliveryCharge').value = data.deliveryCharge || "0.00";
                    document.getElementById('dQuotePrice').value = data.quotePrice || "0.00";

                    const statusBadge = document.getElementById('statusDisplay');
                    statusBadge.innerText = `Status: ${data.status || "Baru"}`;
                    if(data.status === "Proceed") statusBadge.style.color = "#34d399";
                    else if(data.status === "Batal") statusBadge.style.color = "#f87171";
                    else statusBadge.style.color = "#fbbf24";

                } else {
                    alert("Rekod pelanggan tidak wujud.");
                    window.location.href = "customers.html";
                }
            } catch (error) {
                console.error("Ralat ambil data:", error);
            }
        }

        loadCustomerData();

        // ==========================================
        // 4. FUNGSI SIMPAN KEMASKINI PELANGGAN
        // ==========================================
        document.getElementById('detailsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveDetailsBtn');
            btn.innerText = "Menyimpan..."; btn.style.opacity = "0.7";

            try {
                await updateDoc(doc(db, "customers", custId), {
                    name: document.getElementById('dName').value,
                    phone: document.getElementById('dPhone').value,
                    device: document.getElementById('dDevice').value,
                    issue: document.getElementById('dIssue').value,
                    techRemarks: document.getElementById('dTechRemarks').value,
                    partsList: document.getElementById('dPartsList').value,
                    
                    partsTotal: document.getElementById('dPartsTotal').value,
                    serviceCharge: document.getElementById('dServiceCharge').value,
                    deliveryCharge: document.getElementById('dDeliveryCharge').value,
                    quotePrice: document.getElementById('dQuotePrice').value 
                });

                alert("Maklumat terperinci berjaya dikemaskini!");
            } catch (error) {
                alert("Gagal menyimpan: " + error.message);
            } finally {
                btn.innerText = "💾 Simpan & Kemaskini Maklumat"; btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
